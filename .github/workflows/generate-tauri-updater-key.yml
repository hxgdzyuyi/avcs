name: Generate Tauri updater key

on:
  workflow_dispatch:
    inputs:
      show_private_key:
        description: "Type SHOW_PRIVATE_KEY to print private key material in the workflow summary."
        required: true
        type: string

permissions:
  contents: read

jobs:
  generate:
    name: Generate updater signing key
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Confirm private key disclosure
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.show_private_key }}" != "SHOW_PRIVATE_KEY" ]; then
            cat <<'EOF' >&2
          This workflow prints Tauri updater private key material to the workflow summary
          and stores it in a short-lived artifact.

          Re-run it with show_private_key=SHOW_PRIVATE_KEY if you really want to generate
          a copyable key pair this way.
          EOF
            exit 1
          fi

      - name: Install Tauri CLI
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v cargo-tauri > /dev/null 2>&1; then
            cargo install tauri-cli --version "=2.8.0" --locked
          fi

          cargo-tauri --version

      - name: Generate updater key material
        id: tauri_key
        shell: bash
        working-directory: rel/app/src-tauri
        run: |
          set -euo pipefail

          key_path="${RUNNER_TEMP}/avcs-tauri-updater.key"
          public_key_path="${key_path}.pub"
          signer_output="${RUNNER_TEMP}/tauri-signer-output.txt"
          password="$(openssl rand -base64 48 | tr -d '\n')"

          cargo tauri signer generate \
            --ci \
            --force \
            --write-keys "${key_path}" \
            --password "${password}" \
            | tee "${signer_output}"

          if [ ! -s "${key_path}" ]; then
            echo "Private key was not generated at ${key_path}" >&2
            exit 1
          fi

          if [ ! -s "${public_key_path}" ]; then
            public_key="$(
              grep -E '^[A-Za-z0-9+/=]{80,}$' "${signer_output}" \
                | tail -n 1 \
                | tr -d '\r\n'
            )"

            if [ -z "${public_key}" ]; then
              echo "Public key was not generated at ${public_key_path} and could not be parsed from signer output." >&2
              exit 1
            fi

            printf '%s' "${public_key}" > "${public_key_path}"
          fi

          public_out="${RUNNER_TEMP}/tauri-updater-public-key.txt"
          private_out="${RUNNER_TEMP}/TAURI_SIGNING_PRIVATE_KEY.txt"
          password_out="${RUNNER_TEMP}/TAURI_SIGNING_PRIVATE_KEY_PASSWORD.txt"
          bundle_out="${RUNNER_TEMP}/tauri-updater-key-material.txt"

          tr -d '\r\n' < "${public_key_path}" > "${public_out}"
          cp "${key_path}" "${private_out}"
          printf '%s' "${password}" > "${password_out}"

          {
            echo "TAURI_SIGNING_PRIVATE_KEY:"
            cat "${private_out}"
            echo
            echo
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD:"
            cat "${password_out}"
            echo
            echo
            echo "TAURI_UPDATER_PUBLIC_KEY:"
            cat "${public_out}"
            echo
          } > "${bundle_out}"

          {
            echo "public_key_file=${public_out}"
            echo "private_key_file=${private_out}"
            echo "password_file=${password_out}"
            echo "bundle_file=${bundle_out}"
            echo "public_key_sha256=$(sha256sum "${public_out}" | awk '{print $1}')"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload key material artifact
        uses: actions/upload-artifact@v7
        with:
          name: tauri-updater-key-material
          path: |
            ${{ steps.tauri_key.outputs.bundle_file }}
            ${{ steps.tauri_key.outputs.public_key_file }}
            ${{ steps.tauri_key.outputs.private_key_file }}
            ${{ steps.tauri_key.outputs.password_file }}
          if-no-files-found: error
          retention-days: 1

      - name: Write summary
        shell: bash
        run: |
          bundle="${{ steps.tauri_key.outputs.bundle_file }}"
          private_key="$(sed -n '/^TAURI_SIGNING_PRIVATE_KEY:$/,/^$/p' "${bundle}" | sed '1d;$d')"
          password="$(sed -n '/^TAURI_SIGNING_PRIVATE_KEY_PASSWORD:$/,/^$/p' "${bundle}" | sed '1d;$d')"
          public_key="$(sed -n '/^TAURI_UPDATER_PUBLIC_KEY:$/,/^$/p' "${bundle}" | sed '1d;$d')"

          cat <<EOF >> "${GITHUB_STEP_SUMMARY}"
          ### Tauri updater key generated

          Copy these values into repository Actions secrets:

          **TAURI_SIGNING_PRIVATE_KEY**

          \`\`\`text
          ${private_key}
          \`\`\`

          **TAURI_SIGNING_PRIVATE_KEY_PASSWORD**

          \`\`\`text
          ${password}
          \`\`\`

          Copy this public key into \`rel/app/src-tauri/tauri.conf.json\` under \`plugins.updater.pubkey\`:

          \`\`\`text
          ${public_key}
          \`\`\`

          Public key SHA-256: \`${{ steps.tauri_key.outputs.public_key_sha256 }}\`

          A one-day artifact named \`tauri-updater-key-material\` contains the same values.

          Treat this run as sensitive. Delete the artifact after copying the values if you do not want it available for the full retention window.
          EOF
