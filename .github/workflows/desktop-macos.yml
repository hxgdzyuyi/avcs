name: Desktop macOS

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and release macOS Apple Silicon app
    runs-on: macos-15
    env:
      APPLE_SIGNING_IDENTITY: "${{ vars.APPLE_SIGNING_IDENTITY || '-' }}"
      APPLE_SIGNING_ENTITLEMENTS: "${{ vars.APPLE_SIGNING_ENTITLEMENTS || '' }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read versions
        shell: bash
        run: |
          . versions
          echo "elixir=$elixir" >> "$GITHUB_ENV"
          echo "otp=$otp" >> "$GITHUB_ENV"
          echo "node=$node" >> "$GITHUB_ENV"

      - name: Setup Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.otp }}
          elixir-version: ${{ env.elixir }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rel/app/src-tauri
          cache-directories: |
            ~/.cargo/bin
          key: aarch64-apple-darwin

      - name: Install Tauri CLI
        shell: bash
        run: |
          if ! command -v cargo-tauri > /dev/null 2>&1; then
            cargo install tauri-cli --version "=2.8.0" --locked
          else
            cargo-tauri --version
          fi

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ inputs.release_tag }}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          notes="$(cat <<EOF
          macOS Apple Silicon build for ${tag}.

          The Tauri build generates updater artifacts for macOS Apple Silicon:
          latest.json, Avcs.app.tar.gz, and Avcs.app.tar.gz.sig.

          The app is not notarized.
          EOF
          )"

          if gh release view "$tag" > /dev/null 2>&1; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release edit "$tag" --notes "$notes" --draft=false
            else
              gh release edit "$tag" --notes "$notes"
            fi
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes "$notes"
            else
              gh release create "$tag" --title "$tag" --notes "$notes" --draft
            fi
          fi

      - name: Build Tauri app and upload updater artifacts
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MIX_ENV: prod
          MIX_TARGET: app
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_SIGNING_ENTITLEMENTS: ${{ env.APPLE_SIGNING_ENTITLEMENTS }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: rel/app
          tauriScript: ./tauri.sh
          args: --target aarch64-apple-darwin
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          releaseDraft: ${{ github.event_name != 'workflow_dispatch' }}
          assetNamePattern: "Avcs-[platform]-[arch][ext]"

      - name: Verify app bundle signing
        shell: bash
        run: |
          set -euo pipefail

          app_path="rel/app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Avcs.app"
          codesign --verify --deep --strict "${app_path}"
          if [ "${APPLE_SIGNING_IDENTITY}" != "-" ]; then
            spctl --assess --type execute "${app_path}"
          else
            echo "Skip spctl assessment for ad-hoc signing identity."
          fi

      - name: Zip app bundle
        shell: bash
        run: |
          ditto -c -k --keepParent \
            rel/app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Avcs.app \
            Avcs-macos-aarch64.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Avcs-macos-aarch64.app
          path: Avcs-macos-aarch64.app.zip
          if-no-files-found: error

      - name: Upload manual release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          shasum -a 256 Avcs-macos-aarch64.app.zip > Avcs-macos-aarch64.app.zip.sha256
          gh release upload "$tag" \
            Avcs-macos-aarch64.app.zip \
            Avcs-macos-aarch64.app.zip.sha256 \
            --clobber
