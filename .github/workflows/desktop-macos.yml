name: Desktop macOS

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and release macOS Apple Silicon app
    runs-on: macos-15
    env:
      ENABLE_APP_SIGNING: "${{ vars.ENABLE_APP_SIGNING || 'true' }}"
      APPLE_SIGNING_IDENTITY: "${{ vars.APPLE_SIGNING_IDENTITY || '-' }}"
      APPLE_SIGNING_ENTITLEMENTS: "${{ vars.APPLE_SIGNING_ENTITLEMENTS || '' }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read versions
        shell: bash
        run: |
          . versions
          echo "elixir=$elixir" >> "$GITHUB_ENV"
          echo "otp=$otp" >> "$GITHUB_ENV"
          echo "node=$node" >> "$GITHUB_ENV"

      - name: Setup Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.otp }}
          elixir-version: ${{ env.elixir }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rel/app/src-tauri
          cache-directories: |
            ~/.cargo/bin
          key: aarch64-apple-darwin

      - name: Install Tauri CLI
        shell: bash
        run: |
          if ! command -v cargo-tauri > /dev/null 2>&1; then
            cargo install tauri-cli --version "=2.8.0" --locked
          else
            cargo-tauri --version
          fi

      - name: Build app
        shell: bash
        run: rel/app/tauri.sh build --target aarch64-apple-darwin

      - name: Sign app bundle
        shell: bash
        run: |
          set -euo pipefail

          app_path="rel/app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Avcs.app"
          if [ "${ENABLE_APP_SIGNING}" != "true" ]; then
            echo "ENABLE_APP_SIGNING is ${ENABLE_APP_SIGNING}. Skip app signing."
            exit 0
          fi

          signing_identity="${APPLE_SIGNING_IDENTITY:-"-"}"
          echo "Signing app with identity: ${signing_identity}"

          args=(
            "--force"
            "--deep"
            "--options"
            "runtime"
          )

          if [ -n "${APPLE_SIGNING_ENTITLEMENTS}" ]; then
            args+=("--entitlements" "${APPLE_SIGNING_ENTITLEMENTS}")
          fi

          args+=("--sign" "${signing_identity}" "${app_path}")
          codesign "${args[@]}"
          codesign --verify --deep --strict "${app_path}"
          if [ "${signing_identity}" != "-" ]; then
            spctl --assess --type execute "${app_path}"
          else
            echo "Skip spctl assessment for ad-hoc signing identity."
          fi

      - name: Zip app bundle
        shell: bash
        run: |
          ditto -c -k --keepParent \
            rel/app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Avcs.app \
            Avcs-macos-aarch64.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Avcs-macos-aarch64.app
          path: Avcs-macos-aarch64.app.zip
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ inputs.release_tag }}"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          notes="$(cat <<EOF
          macOS Apple Silicon build for ${tag}.

          This app is signed before packaging using codesign (identity: ${APPLE_SIGNING_IDENTITY}),
          with runtime options enabled. It is not notarized.
          EOF
          )"

          if gh release view "$tag" > /dev/null 2>&1; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release edit "$tag" --notes "$notes" --draft=false
            else
              gh release edit "$tag" --notes "$notes"
            fi
          else
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh release create "$tag" --target "$GITHUB_SHA" --title "$tag" --notes "$notes"
            else
              gh release create "$tag" --title "$tag" --notes "$notes" --draft
            fi
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release.outputs.tag }}"
          shasum -a 256 Avcs-macos-aarch64.app.zip > Avcs-macos-aarch64.app.zip.sha256
          gh release upload "$tag" \
            Avcs-macos-aarch64.app.zip \
            Avcs-macos-aarch64.app.zip.sha256 \
            --clobber
